{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg p-4" style="width: 400px; border-radius: 20px; background: linear-gradient(135deg, #f5f7fa, #c3cfe2);">
        <h2 class="text-center mb-4 fw-bold" style="color:#1a237e;">Login</h2>

        <form method="POST">
            <div class="mb-3">
                <label for="username" class="form-label fw-bold">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label fw-bold">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-gradient w-100 mt-3">Login</button>
        </form>

        <p class="text-center mt-3">
            Don't have an account? <a href="{{ url_for('signup') }}" class="fw-bold" style="color:#1a237e;">Sign Up</a>
        </p>
    </div>
</div>

<style>
.btn-gradient {
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    color: white;
    font-weight: bold;
    border-radius: 50px;
    transition: all 0.3s ease-in-out;
}
.btn-gradient:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 25px rgba(0,0,0,0.3);
}
</style>
{% endblock %}
